<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Radial glow behind icon -->
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#5989D9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5989D9" stop-opacity="0"/>
    </radialGradient>
    <!-- Icon gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5989D9"/>
      <stop offset="100%" stop-color="#3A62B0"/>
    </linearGradient>
    <!-- Top accent bar gradient -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="10%" stop-color="#5989D9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5989D9" stop-opacity="1"/>
      <stop offset="90%" stop-color="#5989D9" stop-opacity="0"/>
    </linearGradient>
    <!-- Icon shadow -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#5989D9" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#121419"/>

  <!-- Radial glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#barGrad)"/>

  <!-- App icon (rounded rect) -->
  <rect x="546" y="130" width="108" height="108" rx="24" ry="24"
        fill="url(#iconGrad)" filter="url(#iconShadow)"/>

  <!-- Letter D inside icon -->
  <text x="588" y="206" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="58" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        letter-spacing="-2">D</text>

  <!-- Three small dots (top-right of icon) -->
  <circle cx="636" cy="146" r="3" fill="rgba(255,255,255,0.55)"/>
  <circle cx="636" cy="156" r="3" fill="rgba(255,255,255,0.55)"/>
  <circle cx="636" cy="166" r="3" fill="rgba(255,255,255,0.55)"/>

  <!-- Title: "Decisio" in blue, ": AI Decision Maker" in white -->
  <text x="600" y="308" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="56" font-weight="700" text-anchor="middle" letter-spacing="-1.5">
    <tspan fill="#5989D9">Decisio</tspan><tspan fill="#FFFFFF">: AI Decision Maker</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="356" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="400" fill="rgba(255,255,255,0.72)" text-anchor="middle"
        letter-spacing="0.3">Stop overthinking. Start deciding.</text>

  <!-- Bottom line -->
  <text x="600" y="432" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="18" font-weight="500" fill="rgba(255,255,255,0.48)" text-anchor="middle"
        letter-spacing="0.8">
    <tspan>NASA's decision math + AI</tspan>
    <tspan dx="8">  </tspan>
    <tspan dx="8">Free for iOS</tspan>
  </text>

  <!-- Dot separator in bottom line -->
  <circle cx="568" cy="428" r="2.5" fill="rgba(255,255,255,0.3)"/>
</svg>
